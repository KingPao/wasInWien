name: Update Events Data

on:
  schedule:
    - cron: "0 5 * * 1"   # woechentlich Montag 05:00 UTC (~07:00 MESZ)
  workflow_dispatch: {}    # manuell ueber GitHub-UI/Actions-Tab ausloesbar

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run collectors
        run: uv run main.py --city vienna
        # Keine Secrets noetig: Reddit laeuft ueber den oeffentlichen JSON-Endpoint,
        # Telegram ueber die oeffentliche Web-Vorschau, beides ohne Login.
        # uv installiert Python + Abhaengigkeiten passend zu pyproject.toml/uv.lock automatisch.

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "chore: update events data [skip ci]"
        